name: 自动发布

# 推送形如 v6.1.0 的 tag 时触发，自动打包为 zip 并创建 Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 打包发布 zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PKG="fapiao-print-${VERSION}.zip"
          # 排除 git、CI 配置与说明类文件，只打运行所需内容
          zip -r "$PKG" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "*.zip" "*.rar" \
            -x ".gitignore"
          echo "PKG=$PKG" >> "$GITHUB_ENV"
          echo "打包完成：$PKG"

      - name: 创建 Release 并上传附件
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: ${{ env.PKG }}
          generate_release_notes: true
