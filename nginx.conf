# 发票打印助手 - Nginx配置文件
# 用于解决部署后的404问题

# HTTP服务器 - 重定向到HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name lcofo.cn;  # 修改为你的域名
    
    # 重定向所有HTTP请求到HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS服务器
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lcofo.cn;  # 修改为你的域名
    
    # SSL证书配置
    ssl_certificate /path/to/ssl/fullchain.pem;  # 修改为你的证书路径
    ssl_certificate_key /path/to/ssl/privkey.pem;  # 修改为你的密钥路径
    
    # SSL协议配置 - 兼容性更好
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # SSL密码套件配置 - 修复bad key share错误
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;  # 改为off，让客户端选择
    
    # SSL会话配置
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # SSL椭圆曲线配置 - 修复key share问题
    ssl_ecdh_curve X25519:secp384r1:prime256v1;
    
    # OCSP Stapling - 提升性能
    ssl_stapling on;
    ssl_stapling_verify on;
    # ssl_trusted_certificate /path/to/ssl/chain.pem;  # 如果需要，取消注释并配置路径
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    root /path/to/your/project;  # 修改为你的项目路径
    index index.html;
    
    # 字符集
    charset utf-8;
    
    # 日志
    access_log /var/log/nginx/invoice_access.log;
    error_log /var/log/nginx/invoice_error.log;
    
    # 主页
    location = / {
        try_files /index.html =404;
    }
    
    # HTML文件
    location ~ \.html$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # 静态资源
    location /static/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000";
        expires 1y;
    }
    
    # CSS文件
    location ~ \.css$ {
        try_files $uri =404;
        add_header Content-Type "text/css; charset=utf-8";
        add_header Cache-Control "public, max-age=31536000";
    }
    
    # JS文件
    location ~ \.js$ {
        try_files $uri =404;
        add_header Content-Type "application/javascript; charset=utf-8";
        add_header Cache-Control "public, max-age=31536000";
    }
    
    # 字体文件
    location ~* \.(woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000";
        expires 1y;
    }
    
    # 图片文件
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000";
        expires 1y;
    }
    
    # 其他文件
    location ~* \.(json|xml|txt|pdf)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 允许跨域(如果需要)
    add_header Access-Control-Allow-Origin "*" always;
    
    # 404处理
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}

# 如果只需要HTTP服务（不使用HTTPS），使用下面的配置替代上面的两个server块:
# server {
#     listen 80;
#     listen [::]:80;
#     server_name lcofo.cn;
#     
#     root /path/to/your/project;
#     index index.html;
#     
#     # ... 其他配置保持不变 ...
# }
